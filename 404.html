<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <link rel="manifest" href="&#x2F;icons&#x2F;site.webmanifest" />
    <link
      rel="mask-icon"
      href="&#x2F;icons&#x2F;safari-pinned-tab.svg"
      color="#5bbad5"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="&#x2F;icons&#x2F;favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="&#x2F;icons&#x2F;favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="&#x2F;icons&#x2F;apple-touch-icon.png"
    />

    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.0/css/bulma.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@0.9.0/css/bulma.min.css"
    /></noscript>
    <link
      rel="preload"
      href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;site.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;site.css"
      />
    </noscript>

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin />

    <link rel="preload"
          as="style"
          href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;515;600;700&display=swap" />

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;515;600;700&display=swap"
          media="print" onload="this.media='all'" />

    <title>Neel Dugar</title>
  </head>

  <body class="site">
    <nav class="navbar is-light" role="navigation" aria-label="main navigation">
      <div class="container">
        <div class="navbar-brand">
          <a class="navbar-item has-text-weight-bold" href="/">Neel Dugar</a>
          <a
            role="button"
            class="navbar-burger burger"
            aria-label="menu"
            aria-expanded="false"
            data-target="navMenu"
          >
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>

        <div id="navMenu" class="navbar-menu">
          <div class="navbar-end">
            <a
              href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;"
              class="navbar-item"
            >
              Home
            </a>

            <a
              href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;posts"
              class="navbar-item"
            >
              Posts
            </a>

            <a
              href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;tags"
              class="navbar-item"
            >
              Tags
            </a>

            <a
              href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;categories"
              class="navbar-item"
            >
              Categories
            </a>

            <div class="navbar-item">
              <div class="field has-addons">
                <div class="control">
                  <input
                    id="search-dialog"
                    class="input is-small"
                    type="search"
                    placeholder="Search"
                  />
                </div>
                <div class="control">
                  <a class="button is-small">
                    <span class="icon"><i class="fas fa-search"></i></span>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="modal">
          <div class="modal-background"></div>
          <div class="modal-card">
            <header class="modal-card-head">
              <p class="modal-card-title">Search</p>
              <button class="delete" aria-label="close"></button>
            </header>
            <section class="modal-card-body">
              <div class="field">
                <p class="control has-icons-right">
                  <input
                    id="search"
                    class="input"
                    type="search"
                    placeholder="🔎 Search the website"
                  />
                  <span class="icon is-small is-right">
                    <i class="fas fa-search"></i>
                  </span>
                </p>
              </div>
              <div class="search-results">
                <div class="search-results__items"></div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </section>

    <main class="hero">
      <div class="hero-body">
        <div class="container">
          <div class="columns">
            <div class="column is-three-fifths is-offset-one-fifth">
              <figure class="image center mb-2">
                <img
                  class="is-rounded card"
                  src="&#x2F;images&#x2F;avatar.webp"
                  alt="avatar"
                  style="max-width: 150px"
                />
              </figure>
              <div class="has-text-centered">
                <h1 class="title">HTTP 404</h1>
                <h2 class="subtitle">
                  It seems you are looking for something that I don't have.
                </h2>
                <p class="is-size-4">
                  <a
                    class="link"
                    href="https://twitter.com/NeelDugar"
                    target="_blank"
                  >
                    <span class="icon">
                      <i class="fab fa-twitter"></i>
                    </span>
                  </a>

                  <a
                    class="link"
                    href="https://www.linkedin.com/in/neel-dugar"
                    target="_blank"
                  >
                    <span class="icon">
                      <i class="fab fa-linkedin"></i>
                    </span>
                  </a>

                  <a
                    class="link"
                    href="https://github.com/NeelDug"
                    target="_blank"
                  >
                    <span class="icon">
                      <i class="fab fa-github"></i>
                    </span>
                  </a>
                </p>
              </div>
              <hr />
              <p class="has-text-centered">
                <a class="link" href="https:&#x2F;&#x2F;neeldug.github.io">
                  Home
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer py-4">
      <div class="has-text-centered">
        <p>
          Built with <span class="icon"><i class="fas fa-code"></i></span> code
          and <span class="icon"> <i class="fas fa-heart"></i></span> love
          <br />
          <span class="has-text-weight-bold">
            Powered By
            <span class="icon"><i class="fas fa-power-off"></i></span> Zola
          </span>
        </p>
      </div>
    </footer>

    <script
      src="https://kit.fontawesome.com/201b8d5e05.js"
      crossorigin="anonymous"
    ></script>
    <script
      type="text/javascript"
      src="https:&#x2F;&#x2F;neeldug.github.io&#x2F;elasticlunr.min.js"
    ></script>
    <script
      type="text/javascript"
      src="https:&#x2F;&#x2F;neeldug.github.io&#x2F;search_index.en.js"
    ></script>
    <script
      type="text/javascript"
      src="https:&#x2F;&#x2F;neeldug.github.io&#x2F;js&#x2F;site.js"
    ></script>
  </body>
</html>
