<!DOCTYPE html>
<html>

<head>
	<meta charset='utf-8'>
	<meta name='viewport' content='width=device-width, initial-scale=1'>

	<meta name='theme-color' content='#ffffff'>
	<meta name='msapplication-TileColor' content='#da532c'>
	<link rel='manifest' href='&#x2F;icons&#x2F;site.webmanifest'>
	<link rel='mask-icon' href='&#x2F;icons&#x2F;safari-pinned-tab.svg' color='#5bbad5' />
	<link rel='icon' type='image/png' sizes='16x16' href='&#x2F;icons&#x2F;favicon-16x16.png' />

</head>

<body class='site'>
	
	<nav class='navbar is-light' role='navigation' aria-label='main navigation'>
		<div class='container'>
			<div class='navbar-brand'>
				<a class='navbar-item has-text-weight-bold' href='/'>Neel Dugar</a>
				<a role='button' class='navbar-burger burger' aria-label='menu' aria-expanded='false'
					data-target='navMenu'>
					<span aria-hidden='true'></span>
					<span aria-hidden='true'></span>
					<span aria-hidden='true'></span>
				</a>
			</div>

			<div id='navMenu' class='navbar-menu'>
				<div class='navbar-end'>
					
					<a href='https:&#x2F;&#x2F;neeldug.github.io&#x2F;' class='navbar-item'>
						Home
					</a>
					
					<a href='https:&#x2F;&#x2F;neeldug.github.io&#x2F;posts' class='navbar-item'>
						Posts
					</a>
					
					<a href='https:&#x2F;&#x2F;neeldug.github.io&#x2F;tags' class='navbar-item'>
						Tags
					</a>
					
					<a href='https:&#x2F;&#x2F;neeldug.github.io&#x2F;categories' class='navbar-item'>
						Categories
					</a>
					
					<div class='navbar-item'>
						<div class='field has-addons'>
							<div class='control'>
								<input id='search-dialog' class='input is-small' type='search' placeholder='Search'>
							</div>
							<div class='control'>
								<a class='button is-small'>
									<span class='icon'><i class='fas fa-search'></i></span>
								</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</nav>
	

	<section class="section">
		<div class="container">
			<div class='modal'>
				<div class='modal-background'></div>
				<div class='modal-card'>
					<header class='modal-card-head'>
						<p class='modal-card-title'>Search</p>
						<button class='delete' aria-label='close'></button>
					</header>
					<section class='modal-card-body'>

						<div class='field'>
							<p class='control has-icons-right'>
								<input id='search' class='input' type='search' placeholder='🔎 Search the website'>
								<span class='icon is-small is-right'>
									<i class='fas fa-search'></i>
								</span>
							</p>
						</div>
						<div class='search-results'>
							<div class='search-results__items'>
							</div>
						</div>
					</section>
				</div>
			</div>
		</div>
	</section>

	
<header class="hero">
	<div class="hero-body">
		<div class="container has-text-centered">
			<h1 class="title">
				<span class="icon"><i class="fas fa-tags"></i></span> Tags
			</h1>
			<h2 class="subtitle">
				3 tags in total
			</h2>
		</div>
	</div>
</header>


	
<main class="section pt-0">
	<div class="container">
		<div class="columns">
			<div class="column is-10 is-offset-1 has-text-justified">
				
				<span class="my-3 mx-2" style="display: inline-block;">
					<a class="link" href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;tags&#x2F;boa&#x2F;">
						<span class="icon"><i class="fas fa-tag"></i></span>Boa<sup>1</sup>
					</a>
				</span>
				
				<span class="my-3 mx-2" style="display: inline-block;">
					<a class="link" href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;tags&#x2F;initial-post&#x2F;">
						<span class="icon"><i class="fas fa-tag"></i></span>Initial Post<sup>1</sup>
					</a>
				</span>
				
				<span class="my-3 mx-2" style="display: inline-block;">
					<a class="link" href="https:&#x2F;&#x2F;neeldug.github.io&#x2F;tags&#x2F;rust&#x2F;">
						<span class="icon"><i class="fas fa-tag"></i></span>Rust<sup>1</sup>
					</a>
				</span>
				
			</div>
		</div>
	</div>
</main>


	
	<footer class='footer py-4'>
		<div class='has-text-centered'>
			<p>
				Built with <span class='icon'><i class='fas fa-code'></i></span> code and <span class='icon'>
					<i class='fas fa-heart'></i></span> love
				<br />
				<span class='has-text-weight-bold'>
					Powered By <span class='icon'><i class='fas fa-power-off'></i></span> Zola
				</span>
			</p>
		</div>
	</footer>
	

	<script src='https://kit.fontawesome.com/201b8d5e05.js' crossorigin='anonymous'></script>
	<script type='text/javascript' src='https:&#x2F;&#x2F;neeldug.github.io&#x2F;elasticlunr.min.js'></script>
	<script type='text/javascript' src='https:&#x2F;&#x2F;neeldug.github.io&#x2F;search_index.en.js'></script>
	<script type='text/javascript' src='https:&#x2F;&#x2F;neeldug.github.io&#x2F;js&#x2F;site.js'></script>
